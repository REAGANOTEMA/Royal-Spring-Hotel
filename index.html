<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Royal Spring Hotel</title>

    <!-- Favicon for browser tab -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <!-- Apple touch icon for iOS -->
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured data for Google search rich results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Royal Spring Hotel",
        "url": "https://royal-spring-hotel.onrender.com",
        "logo": "https://royal-spring-hotel.onrender.com/logo.png"
      }
    </script>

    <!-- SEO meta tags -->
    <meta name="description" content="Royal Spring Hotel – Luxury Resort with premium rooms, bookings, and services." />
    <meta name="keywords" content="Royal Spring Hotel, luxury resort, rooms, bookings, ERP system" />

    <!-- Open Graph meta tags for better social media sharing -->
    <meta property="og:title" content="Royal Spring Hotel" />
    <meta property="og:description" content="Luxury Resort with premium rooms, bookings, and services." />
    <meta property="og:image" content="https://royal-spring-hotel.onrender.com/logo.png" />
    <meta property="og:url" content="https://royal-spring-hotel.onrender.com" />
    <meta property="og:type" content="website" />

    <!-- Tailwind / global styles (imported via Vite or bundler) -->
    <link rel="stylesheet" href="/globals.css" />

    <!-- Link to Google Fonts (optional) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  </head>

  <body class="bg-slate-50 font-sans">
    <!-- React app root -->
    <div id="root"></div>

    <!-- Main entry point for React + Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
